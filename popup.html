<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>FitMatch</title>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-row">
        <div class="brand">
          <span class="logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
              <path d="M5 4h14l-2 6H7L5 4Z" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M7 10v10h10V10" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M9.5 14.5l1.8 1.8 3.2-3.4" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="brandname">FitMatch</span>
        </div>
        <button id="infoBtn" class="info-btn" data-i18n-title="how.btn" aria-label="How it works">
          <svg viewBox="0 0 20 20" width="18" height="18" fill="none">
            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.6"/>
            <path d="M10 9v4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="10" cy="6.4" r="1.05" fill="currentColor"/>
          </svg>
        </button>
      </div>
      <nav class="tabs" id="tabs">
        <span class="tab-pill" id="tabPill"></span>
        <button class="tab is-active" data-view="result" data-i18n="tab.recommend">Recommendation</button>
        <button class="tab" data-view="profile" data-i18n="tab.profile">My profile</button>
      </nav>
    </header>

    <main>
      <!-- RESULT VIEW -->
      <section id="view-result" class="view is-active">
        <div id="resultEmpty" class="empty">
          <div class="empty-art" aria-hidden="true">
            <svg viewBox="0 0 64 64" width="56" height="56" fill="none">
              <path d="M16 12h32l-5 14H21l-5-14Z" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
              <path d="M21 26v26h22V26" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
              <circle cx="44" cy="44" r="11" fill="var(--card)" stroke="currentColor" stroke-width="2.5"/>
              <path d="M40 44l3 3 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p class="empty-title" data-i18n="empty.title">Find your right size</p>
          <p class="empty-text" data-i18n="empty.text">
            Open a product page in a webshop and press the button.
          </p>
        </div>

        <div id="resultCard" class="result-card" hidden>
          <div class="result-top">
            <div class="gauge" id="gauge"></div>
            <div class="result-meta">
              <p class="result-kicker" data-i18n="res.kicker">Recommended size</p>
              <p id="resSize" class="result-size">M</p>
              <p id="resReason" class="result-reason"></p>
            </div>
          </div>

          <div id="resBars" class="zones"></div>
          <p id="resApprox" class="approx-note" hidden></p>

          <div id="resAlts" class="alts"></div>
          <p id="resSource" class="source-note"></p>
          <div id="resFeedback" class="feedback"></div>
        </div>

        <div id="resultError" class="error-card" hidden></div>

        <p id="analyzedPage" class="analyzed-page" hidden></p>

        <button id="analyzeBtn" class="primary-btn">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none" aria-hidden="true">
            <circle cx="9" cy="9" r="6" stroke="#fff" stroke-width="1.8"/>
            <path d="m13.5 13.5 3 3" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span data-i18n="btn.analyze">Analyse this page</span>
        </button>
      </section>

      <!-- PROFILE VIEW -->
      <section id="view-profile" class="view">
        <label class="field field-wide" style="margin-bottom: 14px"><span data-i18n="profile.language">Language</span>
          <span class="select-wrap">
            <select id="f-lang">
              <option value="en">English</option>
              <option value="da">Dansk</option>
              <option value="de">Deutsch</option>
              <option value="fr">Français</option>
              <option value="es">Español</option>
            </select>
          </span>
        </label>

        <p class="section-intro" data-i18n="profile.intro">
          Your measurements are stored only locally in your browser.
        </p>

        <p class="field-label" style="margin-top: 0" data-i18n="profile.gender">Gender</p>
        <div class="fit-toggle" id="genderToggle">
          <button data-gender="herre"><span data-i18n="gender.herre">Men</span></button>
          <button data-gender="dame"><span data-i18n="gender.dame">Women</span></button>
          <button data-gender="unisex" class="is-active"><span data-i18n="gender.unisex">Unisex</span></button>
        </div>

        <div class="field-grid" style="margin-top: 16px">
          <label class="field field-wide"><span data-i18n="field.height">Height</span>
            <span class="input-wrap"><input type="number" id="f-height" inputmode="numeric" placeholder="180" /><span class="unit">cm</span></span>
          </label>
          <label class="field"><span data-i18n="field.chest">Chest</span>
            <span class="input-wrap"><input type="number" id="f-chest" inputmode="numeric" placeholder="100" /><span class="unit">cm</span></span>
          </label>
          <label class="field"><span data-i18n="field.waist">Waist</span>
            <span class="input-wrap"><input type="number" id="f-waist" inputmode="numeric" placeholder="86" /><span class="unit">cm</span></span>
          </label>
          <label class="field"><span data-i18n="field.hip">Hip</span>
            <span class="input-wrap"><input type="number" id="f-hip" inputmode="numeric" placeholder="102" /><span class="unit">cm</span></span>
          </label>
          <label class="field"><span data-i18n="field.shoulder">Shoulder</span>
            <span class="input-wrap"><input type="number" id="f-shoulder" inputmode="numeric" placeholder="46" /><span class="unit">cm</span></span>
          </label>
        </div>

        <p class="field-label" data-i18n="profile.fitPref">Preferred fit</p>
        <div class="fit-toggle" id="fitToggle">
          <button data-fit="tight"><span data-i18n="pref.tight">Tight</span></button>
          <button data-fit="regular" class="is-active"><span data-i18n="pref.regular">Regular</span></button>
          <button data-fit="loose"><span data-i18n="pref.loose">Loose</span></button>
        </div>

        <button id="saveBtn" class="primary-btn" data-i18n="btn.save">Save profile</button>
        <p id="saveMsg" class="save-msg" hidden data-i18n="profile.saved">Profile saved</p>

        <details class="howto">
          <summary data-i18n="howto.summary">How to measure correctly</summary>
          <ul>
            <li data-i18n-html="howto.chest"></li>
            <li data-i18n-html="howto.waist"></li>
            <li data-i18n-html="howto.hip"></li>
            <li data-i18n-html="howto.shoulder"></li>
          </ul>
        </details>

        <details class="howto">
          <summary data-i18n="ai.summary">AI analysis (advanced)</summary>
          <label class="field" style="margin-top: 12px"><span data-i18n="ai.endpointLabel">Backend endpoint</span>
            <span class="input-wrap"><input type="text" id="f-endpoint" placeholder="https://your-site/.netlify/functions/estimate" /></span>
          </label>
          <p class="howto-hint" data-i18n-html="ai.hint"></p>
        </details>
      </section>
    </main>

    <div id="howOverlay" class="overlay" hidden>
      <div class="overlay-card">
        <h2 class="overlay-title" data-i18n="how.title">How FitMatch works</h2>
        <p class="overlay-intro" data-i18n="how.intro"></p>

        <div class="how-step how-s1">
          <p class="how-st" data-i18n="how.s1t"></p>
          <p class="how-sx" data-i18n="how.s1"></p>
        </div>
        <div class="how-step how-s2">
          <p class="how-st" data-i18n="how.s2t"></p>
          <p class="how-sx" data-i18n="how.s2"></p>
        </div>
        <div class="how-step how-s3">
          <p class="how-st" data-i18n="how.s3t"></p>
          <p class="how-sx" data-i18n="how.s3"></p>
        </div>

        <p class="overlay-conf" data-i18n="how.conf"></p>
        <button id="howClose" class="primary-btn" data-i18n="how.close">Got it</button>
      </div>
    </div>

    <script src="i18n.js"></script>
    <script src="engine.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
